<div class="auth-header">
    <div class="auth-logo">
        <i class="fas fa-user-shield"></i>
    </div>
    <h2>New Password</h2>
    <p>Please enter the token and your new password</p>
</div>

<form id="reset-form">
    <div class="auth-form-group">
        <label class="auth-label">Reset Token</label>
        <div class="auth-input-wrapper">
            <i class="fas fa-ticket-alt"></i>
            <input type="text" class="auth-input" id="token" placeholder="XXXXXX" required>
        </div>
    </div>

    <div class="auth-form-group">
        <label class="auth-label">New Password</label>
        <div class="auth-input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" class="auth-input" id="password" placeholder="••••••••" required
                oninput="auth.checkStrength(this.value)">
        </div>
        <div class="strength-meter">
            <div id="strength-bar" class="strength-bar"></div>
        </div>
        <p id="strength-text" class="strength-text">Enter a strong password</p>
    </div>

    <div class="auth-form-group">
        <label class="auth-label">Confirm Password</label>
        <div class="auth-input-wrapper">
            <i class="fas fa-check-double"></i>
            <input type="password" class="auth-input" id="confirm-password" placeholder="••••••••" required>
        </div>
    </div>

    <button type="submit" class="auth-btn">
        <span>Reset Password</span>
        <i class="fas fa-sync-alt"></i>
    </button>
</form>

<div class="auth-footer">
    Back to <a href="#" class="auth-link" onclick="auth.loadForm('login')">Sign In</a>
</div>
